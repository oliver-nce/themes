{%- extends "templates/web.html" -%}

{%- block head_include -%}

<link rel="stylesheet" href="/assets/themes/frontend/assets/themes.css?v={{ _v }}">
<link rel="stylesheet" href="/assets/themes/css/fonts.css?v={{ _v }}">
<link rel="stylesheet" href="/assets/themes/css/nce_theme.css?v={{ _v }}">
